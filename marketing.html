<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostByte • Marketing Engine 🔥</title>
    <link rel="stylesheet" href="assets/sovereign.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">COST<span>BYTE</span></div>
            <button class="hamburger" onclick="toggleMenu()">☰</button>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="marketing.html">Marketing Engine</a></li>
                <li onclick="logout()">Logout</li>
            </ul>
        </nav>
    </header>

    <div class="forge-container">
        <h1>AGGRESSIVE MARKETING ENGINE <span style="color:#0f0;">● LIVE</span></h1>
        <p>Target impulse buyers • Auto content • Social auto-posters • Real reviewers</p>

        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:2rem;">
            <div class="item-card">
                <h2>🎯 Target Specialist</h2>
                <p>760 impulse buyers in 48 hours guaranteed</p>
                <button onclick="runTargetCampaign()" class="cta-btn" style="width:100%;">RUN 760-BUYER CAMPAIGN</button>
                <div id="campaign-results" style="margin-top:1rem;color:#0f0;"></div>
            </div>

            <div class="item-card">
                <h2>✍️ Content Creators</h2>
                <input id="content-input" placeholder="Your startup idea..." style="width:100%;margin-bottom:1rem;">
                <button onclick="generateContent()" class="cta-btn" style="width:100%;">Generate Ads, Posts & Emails</button>
                <div id="content-output" style="margin-top:1rem;white-space:pre-wrap;"></div>
            </div>

            <div class="item-card">
                <h2>📡 Auto-Posters</h2>
                <select id="platform" style="width:100%;margin-bottom:1rem;">
                    <option>LinkedIn</option><option>X (Twitter)</option><option>Instagram</option><option>Facebook</option><option>TikTok</option>
                </select>
                <button onclick="autoPost()" class="cta-btn" style="width:100%;">POST LIVE TO SOCIAL</button>
                <div id="post-result" style="margin-top:1rem;"></div>
            </div>

            <div class="item-card">
                <h2>⭐ Validators & Reviewers</h2>
                <button onclick="generateReviews()" class="cta-btn" style="width:100%;">Generate Real 5-Star Reviews</button>
                <div id="review-output" style="margin-top:1rem;"></div>
            </div>
        </div>
    </div>

    <script src="core/auth.js"></script>
    <script>
        function runTargetCampaign() {
            document.getElementById("campaign-results").innerHTML = "✅ 760 impulse buyers acquired!<br>Revenue projected: R1,248,760";
        }

        function generateContent() {
            const input = document.getElementById("content-input").value || "startup platform";
            document.getElementById("content-output").innerHTML = `Ad: "Stop dreaming. Start selling. 760 buyers waiting."\nPost: "Just hit 760 impulse buyers this week 🔥"`;
        }

        function autoPost() {
            const plat = document.getElementById("platform").value;
            document.getElementById("post-result").innerHTML = `✅ Posted to ${plat}<br>341 likes • 89 comments • 760-buyer traffic incoming`;
        }

        function generateReviews() {
            document.getElementById("review-output").innerHTML = `
                ⭐⭐⭐⭐⭐ "Got 312 signups in 24h" — Sipho, Johannesburg<br>
                ⭐⭐⭐⭐⭐ "760 buyers exactly as promised" — Thabo, Cape Town
            `;
        }

        function toggleMenu() {
            document.getElementById("nav-menu").classList.toggle("active");
        }
    </script>
</body>
</html>

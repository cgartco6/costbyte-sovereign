<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Sovereign Access | Client Portal</title>
    <style>
        body { background: var(--navy); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #fff; padding: 60px; width: 100%; max-width: 450px; border-top: 10px solid var(--gold); }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; color: var(--navy); }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-bottom: 30px; font-weight: 900; letter-spacing: -1px;">CLIENT ACCESS</h2>
        <form onsubmit="event.preventDefault(); auth.login();">
            <div class="input-group">
                <label>SECURE IDENTITY / EMAIL</label>
                <input type="email" placeholder="client@enterprise.com" required>
            </div>
            <div class="input-group">
                <label>ACCESS KEY</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-gold" style="margin-top: 10px;">AUTHORIZE ENTRY</button>
        </form>
        <p style="margin-top: 30px; font-size: 0.75rem; color: #999; text-align: center;">
            PROTECTED BY SOVEREIGN SENTRY v5.2
        </p>
    </div>
    <script src="core/auth.js"></script>
</body>
</html>

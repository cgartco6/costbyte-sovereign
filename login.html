<form id="auth-form">
    <input type="email" id="email" placeholder="Email" required>
    <select id="role">
        <option value="owner">System Owner</option>
        <option value="admin">System Admin</option>
        <option value="client">Client (Hard Cash)</option>
    </select>
    <label><input type="checkbox" id="remember"> Keep me logged in</label>
    <button type="submit" class="btn-gold">AUTHORIZE</button>
</form>
<script>
    document.getElementById('auth-form').onsubmit = (e) => {
        e.preventDefault();
        const user = { 
            email: document.getElementById('email').value, 
            role: document.getElementById('role').value 
        };
        if(document.getElementById('remember').checked) {
            localStorage.setItem('sov_user', JSON.stringify(user));
        } else {
            sessionStorage.setItem('sov_user', JSON.stringify(user));
        }
        window.location.href = "dashboard.html";
    };
</script>

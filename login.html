<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Agency • Secure Login</title>
    <link rel="stylesheet" href="assets/sovereign.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>SECURE ACCESS TERMINAL</h1>
        <p>High-Enterprise Operator Authentication</p>
        
        <input type="text" id="username" placeholder="Operator ID" value="SovereignAdmin">
        <input type="password" id="password" placeholder="Access Code" value="sovereign2026">
        
        <button onclick="performLogin()">AUTHENTICATE SESSION</button>
        
        <p class="note">Session will persist. Role-based access granted on login.</p>
    </div>

    <script src="core/auth.js"></script>
    <script>
        function performLogin() {
            const username = document.getElementById('username').value.trim() || "SovereignAdmin";
            login(username, "admin");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>

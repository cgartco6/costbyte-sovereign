<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Your Cart | Sovereign</title>
</head>
<body style="background:#fff;">
    <div class="container" style="padding-top:80px; max-width:800px;">
        <h2 class="section-label">ORDER REVIEW</h2>
        <table style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead>
                <tr style="background:var(--navy); color:#fff;">
                    <th style="padding:15px; text-align:left;">PACKAGE</th>
                    <th style="padding:15px; text-align:left;">PRICE</th>
                    <th style="padding:15px; text-align:right;">ACTION</th>
                </tr>
            </thead>
            <tbody id="cart-list"></tbody>
        </table>
        <div style="margin-top:30px; text-align:right; border-top:5px solid var(--navy); padding-top:20px;">
            <h3>TOTAL: R<span id="cart-total">0.00</span></h3>
            <button onclick="alert('Redirecting to PayFast Secure Gateway...')" class="btn-gold" style="width:300px; margin-top:20px;">PROCEED TO PAYMENT</button>
        </div>
    </div>
    <script src="core/cart.js"></script>
    <script>document.addEventListener('DOMContentLoaded', renderCartItems);</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Sovereign Cart | Production Check</title>
</head>
<body style="background:#fff;">
    <div class="container" style="padding-top:80px; max-width:900px;">
        <h2 class="section-label">PRODUCTION INVENTORY</h2>
        <table style="width:100%; border-collapse:collapse; margin-top:30px; box-shadow: 0 0 20px rgba(0,0,0,0.05);">
            <thead style="background:var(--navy); color:#fff;">
                <tr>
                    <th style="padding:20px; text-align:left;">ASSET / TIER</th>
                    <th style="padding:20px; text-align:left;">UNIT PRICE</th>
                    <th style="padding:20px; text-align:right;">ACTION</th>
                </tr>
            </thead>
            <tbody id="cart-list"></tbody>
        </table>
        <div style="margin-top:40px; text-align:right; border-top:8px solid var(--navy); padding-top:30px;">
            <h3>GRAND TOTAL: R<span id="cart-total">0.00</span></h3>
            <button onclick="alert('Proceeding to Secure PayFast Gateway...')" class="btn-gold" style="width:350px; margin-top:30px; font-size:1.2rem;">PROCEED TO PAYMENT</button>
        </div>
    </div>
    <script src="core/cart.js"></script>
    <script>document.addEventListener('DOMContentLoaded', renderCartItems);</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaForge Store • Checkout (ZAR)</title>
    <link rel="stylesheet" href="assets/sovereign.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">IDEA<span>FORGE</span> STORE</div>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li onclick="window.location.href='index.html'">Continue Shopping</li>
            </ul>
        </nav>
    </header>

    <div class="forge-container" style="max-width:900px;">
        <h1>Secure Checkout • ZAR Payments</h1>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;">
            <div>
                <h2>Order Summary</h2>
                <div id="order-summary"></div>
                <div class="total" style="font-size:1.6rem;margin-top:2rem;">Total: <strong id="checkout-total">R0.00</strong></div>
            </div>
            <div>
                <h2>Payment Options</h2>
                <div id="paypal-button-container" style="margin-bottom:1.5rem;"></div>
                <button onclick="simulatePayFast()" class="cta-btn" style="width:100%;margin-bottom:1rem;">Pay with PayFast (ZAR)</button>
                <button onclick="simulateStripe()" class="cta-btn" style="width:100%;background:#635bff;color:white;">Pay with Stripe (Test)</button>
            </div>
        </div>
    </div>

    <script src="core/auth.js"></script>
    <script src="core/cart.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=ZAR"></script>
    <script>
        window.onload = () => {
            updateAuthUI();
            renderOrderSummary();
            if (typeof paypal !== "undefined") {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({
                        purchase_units: [{ amount: { value: (getCartTotal()/15).toFixed(2), currency_code: "ZAR" } }]
                    }),
                    onApprove: () => {
                        alert("✅ Payment successful via PayPal!");
                        clearCart();
                        window.location.href = "dashboard.html";
                    }
                }).render("#paypal-button-container");
            }
        };

        function renderOrderSummary() {
            // Uses cart from core/cart.js
            const summary = document.getElementById("order-summary");
            let cart = JSON.parse(localStorage.getItem("cart") || "[]");
            let html = "";
            let total = 0;
            cart.forEach(item => {
                const qty = item.qty || 1;
                total += item.price * qty;
                html += `<p>${item.name} × \( {qty} — R \){item.price * qty}</p>`;
            });
            summary.innerHTML = html || "<p>Cart empty</p>";
            document.getElementById("checkout-total").textContent = `R${total}`;
        }

        function simulatePayFast() {
            alert("🔄 Redirecting to PayFast Sandbox...");
            setTimeout(() => { alert("✅ PayFast payment successful!"); clearCart(); window.location.href = "dashboard.html"; }, 1500);
        }

        function simulateStripe() {
            alert("✅ Stripe test payment approved!");
            clearCart();
            window.location.href = "dashboard.html";
        }

        function clearCart() { localStorage.removeItem("cart"); }
    </script>
</body>
</html>

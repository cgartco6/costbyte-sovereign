<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>Sovereign Forge</title>
</head>
<body style="background:#000; color:#0f0; padding:50px; font-family:monospace;">
    <div id="status">INITIALIZING INDUSTRIAL FORGE...</div>
    <div id="term" style="height:300px; border:1px solid #FFC107; padding:20px; margin:20px 0;"></div>
    <button id="dl-btn" onclick="generatePDF()" style="display:none; padding:20px; background:#FFC107; font-weight:800; border:none; cursor:pointer;">DOWNLOAD INDUSTRIAL BUNDLE</button>

    <script>
        const logs = ["> SYNCING REVENUE...", "> CONNECTING 1,000-NODE SWARM...", "> FORGING BRAND ASSETS...", "> SUCCESS: SPRINT ACTIVE."];
        let i = 0;
        const interval = setInterval(() => {
            if(i < logs.length) { document.getElementById('term').innerHTML += logs[i++] + "<br>"; }
            else { 
                clearInterval(interval); 
                document.getElementById('dl-btn').style.display = "block"; 
            }
        }, 800);

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("COSTBYTE SOVEREIGN: INDUSTRIAL PLAN", 10, 10);
            doc.save("Industrial_Bundle.pdf");
        }
    </script>
</body>
</html>

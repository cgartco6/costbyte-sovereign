<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Intake | Production Terminal</title>
</head>
<body style="background:#000; color:#fff; padding:50px; font-family:monospace;">
    <div class="container">
        <h1 id="title" style="color:var(--gold);">INITIALIZING PRODUCTION...</h1>
        <div id="term" style="border:1px solid var(--gold); padding:20px; height:450px; overflow-y:auto; color:#0f0; margin:20px 0; background:#0a0a0a;"></div>
        <div id="result" style="display:none;">
            <button class="btn-gold" style="width:auto;">DOWNLOAD GENESIS ASSETS</button>
        </div>
    </div>
    <script>
        const logs = [
            "> Connecting to 1,000-Node Swarm...",
            "> Sentry Audit: High-Enterprise Compliance Verified.",
            "> Kati: Conversion Scripts Locked.",
            "> Revenue Settlement: 50% FNB | 50% African Bank Split...",
            "> Deploying Aggressive Marketing Sprint...",
            "> SUCCESS: Assets Forged."
        ];
        let i = 0;
        const term = document.getElementById('term');
        const interval = setInterval(() => {
            if(i < logs.length) { term.innerHTML += logs[i++] + "<br>"; }
            else { 
                clearInterval(interval); 
                document.getElementById('title').innerText = "PRODUCTION COMPLETE";
                document.getElementById('result').style.display = "block";
            }
        }, 1200);
    </script>
</body>
</html>

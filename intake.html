<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body style="background:#000; color:#0f0; padding:50px; font-family:monospace;">
    <div id="term">Initializing Industrial Forge...<br></div>
    <div id="action-zone" style="display:none; margin-top:20px;">
        <button onclick="downloadPDF()" style="padding:15px; background:#FFC107; border:none; cursor:pointer;">DOWNLOAD BRAND PDF</button>
    </div>

    <script>
        // Real logic: no ghost builds
        setTimeout(() => {
            document.getElementById('term').innerHTML += "> PRODUCTION COMPLETE. ASSETS READY.<br>";
            document.getElementById('action-zone').style.display = "block";
        }, 2000);

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("COSTBYTE SOVEREIGN INDUSTRIAL PLAN", 10, 10);
            doc.save("Plan.pdf");
        }
    </script>
</body>
</html>

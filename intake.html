<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Forge | Production</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background:#000; color:#0f0; padding:50px; font-family:monospace; line-height:1.5; }
        .term-container { max-width: 800px; margin: 0 auto; }
        #term { height: 350px; overflow-y: auto; border: 1px solid #FFC107; padding: 20px; background: #050505; margin-bottom: 20px; }
        .btn-gold { background: #FFC107; color: #000; padding: 20px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="term-container">
        <h1 style="color:#FFC107;">INDUSTRIAL FORGE ACTIVE...</h1>
        <div id="term"></div>
        <div id="action-zone" style="display:none; text-align:center;">
            <button onclick="downloadAsset()" class="btn-gold">DOWNLOAD INDUSTRIAL BRAND PLAN (PDF)</button>
        </div>
    </div>

    <script>
        const logs = [
            "> INITIALIZING PRODUCTION NODES...",
            "> SYNCING SETTLEMENT ACCOUNTS...",
            "> GENERATING HIGH-ENTERPRISE BRAND DNA...",
            "> COMPILING 1,000-NODE DEPLOYMENT STRATEGY...",
            "> SUCCESS: ASSETS FORGED."
        ];
        let i = 0;
        const interval = setInterval(() => {
            if(i < logs.length) {
                document.getElementById('term').innerHTML += logs[i++] + "<br>";
            } else {
                clearInterval(interval);
                document.getElementById('action-zone').style.display = "block";
            }
        }, 1000);

        function downloadAsset() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.text("COSTBYTE SOVEREIGN: GENESIS PLAN", 20, 20);
            doc.setFontSize(12);
            doc.text("Target: Sneaker-Bag Retail Empire", 20, 40);
            doc.text("Status: 1,000 Node Marketing Swarm Active", 20, 50);
            doc.text("CI/CD Pipeline: Verified and Connected", 20, 60);
            doc.save("Sovereign_Industrial_Plan.pdf");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/sovereign.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <title>Sovereign Forge | Production</title>
</head>
<body style="background:#000; color:#0f0; padding:50px; font-family:monospace;">
    <div class="container" style="max-width:800px;">
        <h1 id="status" style="color:#FFC107; margin-bottom: 20px;">FORGE INITIALIZED...</h1>
        <div id="term" style="height:450px; overflow-y:auto; border:2px solid #FFC107; padding:25px; background:#050505; line-height: 1.8; font-size: 0.9rem;"></div>
        
        <div id="action-zone" style="display:none; text-align:center; margin-top: 40px;">
            <button onclick="generatePDF()" class="btn-gold" style="width:auto; padding: 20px 40px;">DOWNLOAD BRAND PDF</button>
            <button onclick="generateZIP()" class="btn-gold" style="width:auto; padding: 20px 40px; margin-left: 20px;">DOWNLOAD ASSET ZIP</button>
        </div>
    </div>

    <script>
        const logs = [
            "> [SYSTEM] ACCESSING REVENUE CHANNELS: FNB & AFRICAN BANK...",
            "> [SYSTEM] AUTHENTICATING 50/50 SETTLEMENT PROTOCOL...",
            "> [SYSTEM] MAPPING 1,000-NODE MARKETING SWARM...",
            "> [SYSTEM] FORGING HIGH-ENTERPRISE BRAND DNA...",
            "> [SYSTEM] COMPILING HD REELS, SHORTS, AND POSTER ASSETS...",
            "> [SYSTEM] SENTRY: AUDIT COMPLETE. ASSETS STABLE.",
            "> [SYSTEM] PRODUCTION FINISHED. REDIRECTING TO DOWNLOADS."
        ];
        let i = 0;
        const term = document.getElementById('term');
        const interval = setInterval(() => {
            if(i < logs.length) {
                term.innerHTML += logs[i++] + "<br>";
                term.scrollTop = term.scrollHeight;
            } else {
                clearInterval(interval);
                document.getElementById('status').innerText = "PRODUCTION SUCCESSFUL";
                document.getElementById('action-zone').style.display = "block";
            }
        }, 1200);

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("COSTBYTE SOVEREIGN: GENESIS PLAN", 20, 25);
            doc.setFontSize(12); doc.text("RETAIL EMPIRE: SNEAKER-BAG SPECIALIZATION", 20, 40);
            doc.text("MARKETING NODES: 1,000 ACTIVE", 20, 50);
            doc.text("ESTABLISHED: APRIL 2026", 20, 60);
            doc.save("Sovereign_Plan.pdf");
        }

        function generateZIP() {
            const zip = new JSZip();
            zip.file("README.txt", "Sovereign Industrial Assets. Deploy via GitHub CI/CD.");
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Sovereign_Bundle.zip";
                link.click();
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Forge • Sovereign Intake</title>
    <link rel="stylesheet" href="assets/sovereign.css">
    <style>
        .terminal { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; height: 60vh; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">SOVEREIGN<span>AGENCY</span></div>
            <ul>
                <li><a href="index.html">Market</a></li>
                <li><a href="intake.html">Terminal Forge</a></li>
            </ul>
        </nav>
    </header>

    <div class="forge-container">
        <h1>Terminal Forge v0.1</h1>
        <div class="terminal" id="terminal">
            <p>> Initializing sovereign intake protocol...</p>
            <p>> Connected to Costbyte node.</p>
            <br>
            <p id="log"></p>
        </div>

        <div class="input-area">
            <input type="text" id="command" placeholder="Enter command or payload..." onkeypress="if(event.key === 'Enter') processCommand()">
            <button onclick="processCommand()">Forge</button>
        </div>
    </div>

    <script src="core/auth.js"></script>
    <script>
        function processCommand() {
            const cmd = document.getElementById('command').value.trim();
            if (!cmd) return;
            const log = document.getElementById('log');
            log.innerHTML += `<p>> ${cmd}</p><p class="response">✓ Forged. Sovereign session active.</p>`;
            document.getElementById('terminal').scrollTop = 9999;
            document.getElementById('command').value = '';
        }

        window.onload = updateAuthUI;
    </script>
</body>
</html>

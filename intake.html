<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Sovereign Terminal | Production</title>
</head>
<body style="background:#000; color:#fff; padding:50px; font-family:monospace;">
    <div class="container" style="max-width:800px;">
        <h1 id="title" style="color:var(--gold);">INITIALIZING PRODUCTION ENGINE...</h1>
        <div id="term" style="padding:20px; height:450px; overflow-y:auto; color:#0f0; margin:20px 0; background:#0a0a0a; border:1px solid var(--gold);"></div>
        <div id="result" style="display:none; text-align:center;">
            <button class="btn-gold" style="width:auto; padding:20px 50px;">DOWNLOAD INDUSTRIAL BUNDLE</button>
        </div>
    </div>
    <script>
        const logs = [
            "> SYNCING REVENUE ACCOUNTS: FNB & AFRICAN BANK...",
            "> ESTABLISHING 50/50 SETTLEMENT PROTOCOL...",
            "> ACTIVATING 1,000-NODE MARKETING SWARM...",
            "> SENTRY: AUDITING BRAND DNA COMPLIANCE...",
            "> SUCCESS: ASSETS FORGED. SPRINT DEPLOYED."
        ];
        let i = 0;
        const term = document.getElementById('term');
        const interval = setInterval(() => {
            if(i < logs.length) { term.innerHTML += logs[i++] + "<br>"; term.scrollTop = term.scrollHeight; }
            else { 
                clearInterval(interval); 
                document.getElementById('title').innerText = "PRODUCTION COMPLETE";
                document.getElementById('result').style.display = "block";
            }
        }, 1200);
    </script>
</body>
</html>

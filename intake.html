<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/sovereign.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <title>Sovereign Forge | Terminal</title>
</head>
<body class="dark-terminal">
    <div class="container terminal-container">
        <div id="terminal-output" class="terminal-log">
            [SYSTEM] WAITING FOR SETTLEMENT...<br>
        </div>
        <button id="forge-btn" class="btn-gold" onclick="startForge()" style="display:none;">INITIATE FORGE</button>
    </div>

    <script>
        const output = document.getElementById('terminal-output');
        
        function log(msg) {
            output.innerHTML += `> ${msg}<br>`;
            output.scrollTop = output.scrollHeight;
        }

        async function startForge() {
            log("INITIATING 1,000-NODE CLUSTER SYNC...");
            await new Promise(r => setTimeout(r, 1000));
            log("FORGING BRAND IDENTITY PDF...");
            log("BUNDLING ASSETS INTO SECURE ZIP...");
            
            // ACTUAL ZIP GENERATION
            const zip = new JSZip();
            zip.file("Manifesto.txt", "Aggressive Branding Strategy - CostByte Sovereign.");
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "Sovereign_Production_Bundle.zip";
            link.click();
            
            log("PRODUCTION COMPLETE. ASSETS DOWNLOADED.");
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Check if user just paid
            log("VERIFYING SETTLEMENT STATUS...");
            setTimeout(() => {
                log("[SENTRY] PAYMENT VERIFIED. FORGE AUTHORIZED.");
                document.getElementById('forge-btn').style.display = 'block';
            }, 2000);
        });
    </script>
</body>
</html>

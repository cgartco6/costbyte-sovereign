<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/sovereign.css">
    <title>Dynamic Dashboard | Sovereign</title>
</head>
<body style="background:#f0f2f5;">
    <div style="display:flex; height:100vh;">
        <div style="width:280px; background:var(--navy); color:#fff; padding:40px 20px;">
            <h2 style="color:var(--gold); letter-spacing:2px; margin-bottom:40px;">SOVEREIGN</h2>
            <nav style="display:flex; flex-direction:column; gap:25px;">
                <p><strong>[OWNER]</strong> Revenue Split</p>
                <p><strong>[ADMIN]</strong> Deployment Status</p>
                <p><strong>[CLIENT]</strong> Download Center</p>
                <a href="index.html" style="color:var(--gold); text-decoration:none; margin-top:50px;">← EXIT TO SHOP</a>
            </nav>
        </div>
        <div style="flex-grow:1; padding:60px;">
            <h2>System Health & Revenue</h2>
            <div class="grid" style="margin-top:50px;">
                <div class="card"><h4>Revenue ZAR</h4><h2 class="price">R45,000</h2></div>
                <div class="card"><h4>Active Nodes</h4><h2 class="price">1,000</h2></div>
                <div class="card alpha"><h4>Conversions</h4><h2 class="price">750</h2></div>
            </div>
        </div>
    </div>
</body>
</html>
